<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: Letter;
    margin: 0.45in 0.5in;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 10pt;
    color: #111;
    line-height: 1.3;
    max-height: 10.1in;
    overflow: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 6px;
  }

  header h1 {
    font-size: 18pt;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  header .contact {
    font-size: 9pt;
    color: #333;
    margin-top: 3px;
  }

  header .contact span {
    margin: 0 6px;
  }

  .divider {
    border: none;
    border-top: 1px solid #ccc;
    margin: 5px 0;
  }

  section {
    margin-bottom: 7px;
  }

  section h2 {
    font-size: 11pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 2px;
  }

  .summary-text {
    font-size: 10pt;
    color: #222;
  }

  .tech-stack {
    font-size: 9.5pt;
    color: #222;
  }

  .job {
    margin-bottom: 7px;
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .job-title {
    font-weight: 700;
    font-size: 10pt;
  }

  .job-company {
    font-size: 10pt;
    color: #333;
  }

  .job-dates {
    font-size: 9pt;
    color: #555;
    white-space: nowrap;
  }

  .job-location {
    font-size: 9pt;
    color: #555;
    font-style: italic;
  }

  ul.bullets {
    margin-top: 3px;
    padding-left: 14px;
  }

  ul.bullets li {
    font-size: 9.5pt;
    line-height: 1.35;
    margin-bottom: 2px;
    color: #111;
  }

  .project {
    margin-bottom: 4px;
  }

  .project-name {
    font-weight: 700;
    font-size: 10pt;
  }

  .project-desc {
    font-size: 9.5pt;
    color: #222;
  }

  .edu-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .edu-school {
    font-weight: 700;
    font-size: 10pt;
  }

  .edu-degree {
    font-size: 9.5pt;
    color: #333;
  }

  .edu-meta {
    font-size: 9pt;
    color: #555;
    text-align: right;
  }
</style>
</head>
<body>

<header>
  <h1>{{name}}</h1>
  <div class="contact">
    <span>{{email}}</span>·
    <span>{{phone}}</span>·
    <span>{{location}}</span>·
    <span>{{linkedin}}</span>·
    <span>{{github}}</span>
  </div>
</header>

<hr class="divider">

<section>
  <h2>Summary</h2>
  <p class="summary-text">{{summary}}</p>
</section>

<section>
  <h2>Technical Skills</h2>
  <p class="tech-stack">{{tech_stack}}</p>
</section>

<section>
  <h2>Professional Experience</h2>
  {{experience}}
</section>

<section>
  <h2>Projects</h2>
  {{projects}}
</section>

<section>
  <h2>Education</h2>
  {{education}}
</section>

</body>
</html>
