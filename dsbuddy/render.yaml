services:
  - type: web
    name: dsbuddy-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # you paste this in the Render dashboard
      - key: REDIS_URL
        value: ""          # leave empty — app falls back to in-memory
      - key: DEBUG
        value: "false"
